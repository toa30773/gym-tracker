<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>オフライン - 筋トレ記録</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <style>
      html, body { height: 100%; margin: 0; background: #ffffff; color: #111111; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; padding: 24px; text-align: center; }
      h1 { font-size: 16px; margin: 0; }
      p { font-size: 12px; color: #666; margin: 0; }
      button { margin-top: 16px; padding: 10px 20px; border-radius: 9999px; background: #111; color: #fff; border: 0; font-weight: bold; font-size: 13px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>オフラインです</h1>
      <p>ネットワークが復旧したら自動で同期されます。</p>
      <button onclick="location.reload()">再読み込み</button>
    </div>
  </body>
</html>
